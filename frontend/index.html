<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Logan Sanderson" />
    <meta
      name="description"
      content="Search page for Refrigerator Saver Web Application"
    />
    <title>Search Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/search.css" />
  </head>
  <body>
    <div class="row" style="margin-top: 2.5vh">
      <header
        class="container-fluid d-flex align-items-center justify-content-between"
        style="flex-wrap: nowrap"
      >
        <h1><b>REFRIGERATOR SAVER</b></h1>

        <a id="admin-page-btn" href="/admin">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="54"
            height="51"
            viewBox="0 0 54 51"
            fill="none"
          >
            <!-- The pill-shaped pink background of the button -->
            <rect width="53.0606" height="51" rx="25.5" fill="red" />
            <mask
              id="mask0_4_327"
              style="mask-type: alpha"
              maskUnits="userSpaceOnUse"
              x="0"
              y="0"
              width="54"
              height="51"
            >
              <rect width="53.0606" height="51" rx="25.5" fill="#FF0000" />
            </mask>

            <!-- The red body/torso circle — clipped by the mask so it doesn't overflow the pill -->
            <g mask="url(#mask0_4_327)">
              <circle cx="26.7878" cy="47.3939" r="14.9394" fill="lightpink" />
            </g>

            <!-- The red head circle — sits above the mask so it's fully visible -->
            <circle cx="26.5303" cy="21.8939" r="10.5606" fill="lightpink" />
          </svg>
        </a>
      </header>

      <div class="search-wrapper">
        <div class="search-bar">
          <!-- aria-hidden="true" hides it from screen readers since it's decorative -->
          <svg
            class="search-icon"
            width="20"
            height="20"
            viewBox="0 0 20 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <!-- The circular lens of the magnifying glass -->
            <circle cx="8.5" cy="8.5" r="6" stroke="#ff0000" stroke-width="2" />

            <!-- The handle: angled down-right at 45deg, rounded end cap, like the macOS Spotlight icon -->
            <line
              x1="12.8"
              y1="12.8"
              x2="17"
              y2="17"
              stroke="#ff0000"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          <input type="text" id="recipeSearch" placeholder="Search recipes" />
        </div>
      </div>
    </div>

    <div class="row">
      <!-- top pick area-->
      <div clas="col-3">
        <!-- top pick details-->
        <h2 class="top-pick-text">
          <b>top pick</b>
        </h2>
        <h3 class="top-pick-recipe-name">Duis tincidunt</h3>
        <p class="top-pick-recipe-blurb">
          <i>
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Fusce
            rhoncus eleifend vehicula. Proin ultricies felis vel sem blandit, ut
            accumsan sapien convallis.
          </i>
        </p>
      </div>
      <div class="col-9">
        <!-- top pick card-->
        <a href="#" id="recipe-card-top-1" class="recipe-card">
          <div class="recipe-card-inner top-pick">
            <img
              id="recipe-card-top-1-img"
              src="your-image-path-here.jpg"
              alt="Recipe photo"
            />
            <div class="recipe-card-label">
              <span id="recipe-card-top-1-name" class="recipe-card-name"
                >Recipe Name</span
              >
            </div>
          </div>
        </a>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./js/frontend.js"></script>
  </body>
</html>
