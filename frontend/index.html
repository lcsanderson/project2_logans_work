<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Logan Sanderson" />
    <meta
      name="description"
      content="Search page for Refrigerator Saver Web Application"
    />
    <title>Search Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/search.css" />
  </head>
  <body>
    <div class="container">
      <h1><b>REFRIGERATOR SAVER</b></h1>

      <div class="search-wrapper">
        <div class="search-bar">
          <!-- aria-hidden="true" hides it from screen readers since it's decorative -->
          <svg
            class="search-icon"
            width="20"
            height="20"
            viewBox="0 0 20 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <!-- The circular lens of the magnifying glass -->
            <circle
              cx="8.5"
              cy="8.5"
              r="6"
              stroke="#ff0000"
              stroke-width="2"
            />

            <!-- The handle: angled down-right at 45deg, rounded end cap, like the macOS Spotlight icon -->
            <line
              x1="12.8"
              y1="12.8"
              x2="17"
              y2="17"
              stroke="#ff0000"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          <input type="text" id="recipeSearch" placeholder="Search recipes" />
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./js/frontend.js"></script>
  </body>
</html>
